  - title: "Mitigating School Closures: Parental Responses and Tutoring Vouchers"
    authors: with <a href="https://www.hyunjaekang.com/" target="_blank">Hyunjae Kang</a> and <a href="https://scholar.google.com/citations?user=KbwSFo4AAAAJ&hl=ko" target="_blank">TaeYoung Kang</a> 
    pdf: https://jaykanglabor.github.io/jobmarket/KangKangKim_Voucher.pdf
    abstract: "We investigate how reduced in-person school days affect educational inequality through parental responses. Exploiting quasi-experimental variation in school-level in-person days and a linked administrative–survey panel, we find that each ten-day loss increases household tutoring expenditure by 4 percent and within-school test-score dispersion by 25 percent. We build and estimate a household choice model where formal schooling and tutoring jointly generate test scores. Estimates suggest tutoring substitutes for in-person days and that closures burden low-income households disproportionately. Counterfactual simulations show that a means-tested tutoring-voucher program matches the overall inequality reduction of a universal scheme while cutting costs by 20 percent."
    status: Revise and Resubmit, <strong style="color:#002D72; font-weight:600">Journal of Applied Econometrics</strong>
    media: Media Coverage (Korean):<a href="https://www.khan.co.kr/national/national-general/article/202211301346001" target="_blank"> The Kyunghyang Shinmun</a>
  
  - title: "Where to Build New Cities: Optimal Urban Land Supply and Korea’s New Town Projects"
    authors: with <a href="https://hansy1124.github.io/" target="_blank">Seungyub Han</a>
    oldtitle: "Building Housing: The Allocative Efficiency of Creating New Cities Versus Expanding Existing Cities"
    pdf: https://sunhamkim.github.io/files/pdf/HanKim_June2026.pdf
    status: UCLA Ziman Center WP No. 2023-13
    abstract: Where should governments supply new urban land? We study this question in a dynamic spatial growth model with a government that allocates land across regions under a budget constraint, where procurement cost scales with the local land price. In the short run, the welfare gain per dollar of procurement cost is equal across regions, and location is irrelevant at the margin. Permanently expanding the urban land stock moves the economy to a new steady state, as capital accumulates, workers migrate, and prices adjust over decades. This long-run gain per dollar no longer scales with the local land price. It varies across regions with the reallocation and accumulation of capital and labor that the new land induces, and the welfare return per dollar of procurement cost, not the local land price, ranks regions for new land. We take the model to South Korea's Second New Town Project, a large-scale urban land supply that converted roughly 5,000 hectares around Seoul into nine serviced cities and delivered around 610,000 housing units at a cost above 10% of 2004 GDP. The project raised long-run aggregate welfare by 0.28%. In our counterfactual, the same budget supplied to a lower-priced region outside the Seoul Metropolitan Area raises welfare by 0.35%. Our results suggest that when the instrument for correcting spatial misallocation is costly, where to deploy it depends on the long-run gains from adjustment relative to their cost, which may not necessarily be the most productive regions.